# ============================================================
# Render Blueprint — ClimateNexus FastAPI Backend
# ============================================================
# One-click deploy: connect this repo to Render and it will
# auto-detect this file.
# ============================================================

services:
  - type: web
    name: climatenexus-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.12"
    healthCheckPath: /docs
